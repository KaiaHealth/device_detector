---
name: CI

on:
  push:
    branches: [ master, develop, ci ]
  pull_request:

jobs:
  rspec:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          bundler-cache: true

      - name: Bundle
        run: |
          bundle install --jobs 4 --retry 3

      - name: Test
        run: |
          bundle exec rake test
